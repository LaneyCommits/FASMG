# Builds the SPA for static hosting and deploys to GitHub Pages.
# In the repo: Settings → Pages → Build and deployment → Source: GitHub Actions
# (If Pages is set to “Deploy from a branch” + /(root), switch it to GitHub Actions
# so this workflow can publish the built site from frontend/dist.)

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Use an absolute base (e.g. /FASMG/) — not "./" — so url('./img/...') never resolves
      # against https://…github.io/ (missing repo segment when the pathname has no trailing slash).
      - name: Install and build (static bundle for Pages)
        run: |
          mkdir -p frontend/public/img
          cp -a img/. frontend/public/img/
          cd frontend
          npm ci
          npx vite build --base "/${{ github.event.repository.name }}/" --outDir=dist

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - id: deployment
        uses: actions/deploy-pages@v4
